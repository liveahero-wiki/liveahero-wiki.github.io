312551:
  name: 故郷に響く調べ
  description: バレンタインにノーモンから贈られたオルゴール。<I>「忘れられない、貴方様との思い出の曲です」</I>
312611:
  name: シニャースくんチョコ
  description: バレンタインにサオトメから贈られたもの。<I>「なかなか良くできとるだろう？」</I>
312641:
  name: 未来に芽吹く種
  description: バレンタインにアンタレスとともに植えた種。<I>「やがて、君と私をつなぐものに育つだろう」</I>
312651:
  name: 完璧なもてなしの記憶
