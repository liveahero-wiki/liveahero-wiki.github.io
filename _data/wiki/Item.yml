312891:
  name: コグスデン探訪記
  description: バレンタインにファーデンと巡った街の記録。<I>「売れっ子になったらこんなこと、もう無いかもね？」</I>
313011:
  name: 遥かなる旅の安全守り
  description: バレンタインにデネボラから贈られたプレゼント。<I>「最後には、必ずオマエを迎えに行くと誓おう」</I>
313021:
  name: 鉱山のお守り石
  description: バレンタインにラスタバンから贈られた宝石。<I>「お……オレの意気地無しィ……」</I>
313031:
  name: ふたりだけの宴
  description: バレンタインにモリヤスと過ごした記憶。<I>「お前さんとの思い出が醸す最高の一杯さぁ」</I>
