name: Jekyll site CI

on:
  workflow_dispatch: ~
  push:
    branches: [ master ]
  schedule:
    - cron: '0 */6 * * *'
  # Use pull_request_target to securely access secrets (Netlify tokens) for labeled PRs
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # JOB 1: Always runs on master pushes and ALL PRs to check syntax/build site
  build-and-test:
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    runs-on: ubuntu-latest
    outputs:
      is_approved: ${{ steps.check-label.outputs.approved }}
    steps:
    # pull_request_target runs in master context, so we must explicitly checkout the PR's HEAD branch
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
        cache: 'pip'

    - name: Generate data files
      run: |
        mkdir zzz
        python -m pip install -r requirements.txt
        python tools/translation_download_tsv.py
        python tools/voice_gsheet.py download
        python tools/skill_evo.py
        python tools/generate_status_pages.py

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Install dependencies
      run: bundle install

    # Every PR and push will hit this step to test for syntax errors / build issues
    - name: Build site
      run: JEKYLL_ENV=production bundle exec jekyll build --future

    # Save the _site artifact so downstream jobs (Netlify/Pages) can use it without rebuilding
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jekyll-site
        path: ./_site

    # Check if the required label is present
    - name: Check for approval label
      id: check-label
      run: |
        if echo "${{ join(github.event.pull_request.labels.*.name, ' ') }}" | grep -q "committer-approved"; then
          echo "approved=true" >> $GITHUB_OUTPUT
        else
          echo "approved=false" >> $GITHUB_OUTPUT
        fi

  # JOB 2: PRs with 'committer-approved' label can additionally publish to Netlify
  preview-netlify:
    needs: build-and-test
    # Triggers only on PRs where the label check passed
    if: "github.event_name == 'pull_request_target' && needs['build-and-test'].outputs.is_approved == 'true'"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code (for package.json/scripts)
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: jekyll-site
        path: ./_site

    - uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: 'deploy/package-lock.json'

    - name: Install Dependencies
      run: npm ci --workspace=deploy

    - name: Publish to Netlify (preview)
      run: npm --workspace=deploy run netlify -- deploy --dir=_site --alias pr-${{ github.event.pull_request.number }} --no-build
      env:
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

  # JOB 3: Restrict GitHub Pages deployment ONLY to master branch pushes/schedules
  deploy-pages:
    # Strictly runs only for push events on master or scheduled cron jobs
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: build-and-test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: jekyll-site
          path: './_site'

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
